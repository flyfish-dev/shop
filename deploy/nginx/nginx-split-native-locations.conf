# 三服务 native app 路由规则。
# 认证实例承载用户、OAuth、邮箱登录和微信快捷登录；低代码实例承载工作台和建模/生成/测试接口；
# 小铺实例承载商城、工单、客服、公众号消息网关、上传和图片资源。

location ^~ /__auth/ {
    proxy_pass http://127.0.0.1:10080/;
    include /opt/flyfish-dev/config/nginx-proxy-headers.conf;
}

location ^~ /__lowcode/ {
    proxy_pass http://127.0.0.1:10081/;
    include /opt/flyfish-dev/config/nginx-proxy-headers.conf;
}

location ^~ /__shop/ {
    proxy_pass http://127.0.0.1:10082/;
    include /opt/flyfish-dev/config/nginx-proxy-headers.conf;
}

location = /portal/workbench {
    proxy_pass http://127.0.0.1:10081;
    include /opt/flyfish-dev/config/nginx-proxy-headers.conf;
}

location = /portal/capabilities {
    proxy_pass http://127.0.0.1:10081;
    include /opt/flyfish-dev/config/nginx-proxy-headers.conf;
}

location ^~ /integrity/ {
    proxy_pass http://127.0.0.1:10081;
    include /opt/flyfish-dev/config/nginx-proxy-headers.conf;
}

location ^~ /shops/ {
    proxy_pass http://127.0.0.1:10082;
    include /opt/flyfish-dev/config/nginx-proxy-headers.conf;
}

location ^~ /portal/customer-service/ {
    proxy_pass http://127.0.0.1:10082;
    include /opt/flyfish-dev/config/nginx-proxy-headers.conf;
}

location ^~ /portal/tickets {
    proxy_pass http://127.0.0.1:10082;
    include /opt/flyfish-dev/config/nginx-proxy-headers.conf;
}

location ^~ /portal/users/ {
    proxy_pass http://127.0.0.1:10080;
    include /opt/flyfish-dev/config/nginx-proxy-headers.conf;
}

location ^~ /portal/files {
    proxy_pass http://127.0.0.1:10082;
    include /opt/flyfish-dev/config/nginx-proxy-headers.conf;
}

location ^~ /oauth/ {
    proxy_pass http://127.0.0.1:10080;
    include /opt/flyfish-dev/config/nginx-proxy-headers.conf;
}

location ^~ /email/ {
    proxy_pass http://127.0.0.1:10080;
    include /opt/flyfish-dev/config/nginx-proxy-headers.conf;
}

location ^~ /wx/quick-login {
    proxy_pass http://127.0.0.1:10080;
    include /opt/flyfish-dev/config/nginx-proxy-headers.conf;
}

location ^~ /wx/qr-codes {
    proxy_pass http://127.0.0.1:10080;
    include /opt/flyfish-dev/config/nginx-proxy-headers.conf;
}

location = /wx {
    proxy_pass http://127.0.0.1:10082;
    include /opt/flyfish-dev/config/nginx-proxy-headers.conf;
}

location ^~ /wx/ {
    proxy_pass http://127.0.0.1:10082;
    include /opt/flyfish-dev/config/nginx-proxy-headers.conf;
}

location ^~ /images/ {
    proxy_pass http://127.0.0.1:10082;
    include /opt/flyfish-dev/config/nginx-proxy-headers.conf;
}
