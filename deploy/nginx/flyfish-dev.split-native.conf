server {
    listen 80;
    listen [::]:80;
    server_name shop.example.com api.example.com;
    root /opt/flyfish-dev/web;

    location = /MP_verify_rdQBx3Rz5whaFsYa.txt {
        default_type text/plain;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files /index.html =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.example.com;

    ssl_certificate /opt/flyfish-dev/certs/cert.crt;
    ssl_certificate_key /opt/flyfish-dev/certs/private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+AES128:EECDH+AES256:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:flyfish_dev_ssl:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;
    error_page 497 https://$host$request_uri;
    client_max_body_size 50m;

    location = /MP_verify_rdQBx3Rz5whaFsYa.txt {
        root /opt/flyfish-dev/web;
        default_type text/plain;
        try_files $uri =404;
    }

    location ^~ /images/contact/ {
        root /opt/flyfish-dev/web;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    include /opt/flyfish-dev/config/nginx-split-native-locations.conf;

    location / {
        proxy_pass http://127.0.0.1:10082;
        include /opt/flyfish-dev/config/nginx-proxy-headers.conf;
    }

    access_log /www/wwwlogs/api.example.com.log;
    error_log /www/wwwlogs/api.example.com.error.log;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name shop.example.com;
    root /opt/flyfish-dev/web;
    index index.html;

    ssl_certificate /opt/flyfish-dev/certs/cert.crt;
    ssl_certificate_key /opt/flyfish-dev/certs/private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+AES128:EECDH+AES256:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:flyfish_dev_ssl:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;
    error_page 497 https://$host$request_uri;
    client_max_body_size 50m;

    location = /MP_verify_rdQBx3Rz5whaFsYa.txt {
        default_type text/plain;
        try_files $uri =404;
    }

    location ^~ /images/contact/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    include /opt/flyfish-dev/config/nginx-split-native-locations.conf;

    location ^~ /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) {
        return 404;
    }

    access_log /www/wwwlogs/shop.example.com.log;
    error_log /www/wwwlogs/shop.example.com.error.log;
}
