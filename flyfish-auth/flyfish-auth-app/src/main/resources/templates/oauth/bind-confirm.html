<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>确认账号换绑</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f5f8fb;
      color: #1f2d3d;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .panel {
      width: min(520px, 100%);
      padding: 28px;
      border: 1px solid #e6edf5;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 18px 44px rgba(31, 70, 110, .10);
      text-align: left;
    }

    .title {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.3;
    }

    .summary {
      margin: 0 0 22px;
      color: #5d6b7c;
      line-height: 1.7;
    }

    .account {
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 14px;
      border: 1px solid #e8eef5;
      border-radius: 10px;
      background: #fbfdff;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      object-fit: cover;
      background: #eef4fb;
    }

    .avatar-fallback {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #1677ff;
      font-weight: 700;
    }

    .account-name {
      margin: 0;
      font-weight: 700;
      line-height: 1.4;
    }

    .account-meta {
      margin: 4px 0 0;
      color: #7d8a99;
      font-size: 13px;
      line-height: 1.5;
    }

    .warnings {
      display: grid;
      gap: 10px;
      margin: 18px 0;
    }

    .warning {
      margin: 0;
      padding: 12px;
      border: 1px solid #ffd591;
      border-radius: 8px;
      background: #fff7e6;
      color: #874d00;
      line-height: 1.65;
    }

    .confirm-line {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin: 18px 0 22px;
      color: #3e4c5d;
      line-height: 1.6;
    }

    .confirm-line input {
      margin-top: 5px;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .button {
      min-width: 112px;
      padding: 9px 16px;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      background: #fff;
      color: #344458;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      text-align: center;
    }

    .button.primary {
      border-color: #1677ff;
      background: #1677ff;
      color: #fff;
    }

    .button.primary:disabled {
      border-color: #b8d5ff;
      background: #b8d5ff;
      cursor: not-allowed;
    }

    @media (max-width: 520px) {
      .panel {
        padding: 22px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<main class="page">
  <section class="panel">
    <h1 class="title">确认账号换绑</h1>
    <p class="summary">
      本次授权识别到 <span th:text="${confirmation.typeName}">第三方平台</span> 账号存在绑定冲突，请确认后再继续。
    </p>

    <div class="account">
      <img th:if="${confirmation.accountAvatar}" class="avatar" th:src="${confirmation.accountAvatar}" alt="">
      <div th:unless="${confirmation.accountAvatar}" class="avatar avatar-fallback" th:text="${#strings.substring(confirmation.typeName, 0, 1)}">账</div>
      <div>
        <p class="account-name" th:text="${confirmation.accountName}">平台账号</p>
        <p class="account-meta" th:if="${confirmation.accountLogin}" th:text="'@' + ${confirmation.accountLogin}">@login</p>
      </div>
    </div>

    <div class="warnings">
      <p class="warning" th:if="${confirmation.externalOwnerConflict}">
        该平台账号已经绑定到另一个飞鱼账号。确认换绑后，只会移动该平台授权关系；原飞鱼账号的资料、订单和其他绑定不会被删除。
      </p>
      <p class="warning" th:if="${confirmation.currentProviderBinding}">
        当前飞鱼账号已绑定另一个 <span th:text="${confirmation.typeName}">平台</span> 账号
        <span th:if="${confirmation.currentAccountName}" th:text="'（' + ${confirmation.currentAccountName} + '）'">（旧账号）</span>。
        确认换绑后，旧绑定会被替换为本次授权账号。
      </p>
    </div>

    <form method="post" th:action="@{/oauth/bind/confirm(ticket=${confirmation.ticket})}">
      <input type="hidden" name="ticket" th:value="${confirmation.ticket}">
      <label class="confirm-line">
        <input id="confirmCheck" type="checkbox">
        <span>我确认将该平台账号绑定到当前飞鱼账号，并理解原账号数据不会被系统自动清理。</span>
      </label>
      <div class="actions">
        <a class="button" th:href="@{/oauth/bind/cancel(ticket=${confirmation.ticket})}">取消</a>
        <button id="confirmButton" class="button primary" type="submit" disabled>确认换绑</button>
      </div>
    </form>
  </section>
</main>
<script>
  const check = document.getElementById("confirmCheck");
  const button = document.getElementById("confirmButton");
  check.addEventListener("change", function () {
    button.disabled = !check.checked;
  });
</script>
</body>
</html>
